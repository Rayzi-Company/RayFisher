<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RayFish — Оформлення замовлення</title>
<style>
body{
  margin:0; padding:0;
  font-family: Arial,sans-serif;
  background:#f2f2f2;
}
header{
  text-align:center; padding:15px 0;
  background: linear-gradient(135deg,#0a5f8f,#00aaff);
  color:white; font-weight:bold; font-size:22px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.container{
  width:90%; max-width:800px; margin:auto; margin-top:20px;
}
h2{text-align:center; color:#0a5f8f; margin-bottom:20px;}
.checkout-item{
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #ccc; padding:10px 0;
}
.checkout-item img{width:50px; height:50px; object-fit:cover; border-radius:6px; margin-right:10px;}
.item-info{flex:1;}
.item-title{font-weight:bold; color:#0a5f8f;}
.item-qty, .item-price, .item-total{font-size:14px; margin-top:3px; color:#0a5f8f;}
.item-qty button{
  padding:2px 6px; margin:0 3px;
  border:none; background:#5dade2; color:white; border-radius:4px; cursor:pointer;
}
.remove-item{
  background:#e74c3c; color:white; border:none;
  padding:5px 8px; border-radius:4px; cursor:pointer;
}
.total-sum{
  text-align:right; margin-top:15px; font-size:18px; font-weight:bold;
  color:#0a5f8f;
}
.back-btn, .order-btn{
  display:inline-block; margin-top:20px; margin-right:10px;
  background:#0a5f8f; color:white; padding:10px 15px; border-radius:8px;
  text-decoration:none; font-weight:bold;
}
.order-btn{background:#27ae60;}
</style>
</head>
<body>

<header>🎣 RayFish — Оформлення замовлення</header>
<div class="container">
<h2>Ваше замовлення</h2>
<div id="checkoutItems"></div>
<div class="total-sum" id="totalSum">Загалом: 0 грн</div>
<a href="products.html" class="back-btn">Повернутися до товарів</a>
<button class="order-btn" id="placeOrder">Оформити замовлення</button>
</div>

<script>
// ===== Ключ локального сховища =====
const cartKey = 'rayfishCart';
let cartData = JSON.parse(localStorage.getItem(cartKey)) || {};
const checkoutContainer = document.getElementById("checkoutItems");
const totalSumEl = document.getElementById("totalSum");

// ===== Функція збереження =====
function saveCart(){
  localStorage.setItem(cartKey, JSON.stringify(cartData));
  renderCart();
}

// ===== Функція виводу кошика =====
function renderCart(){
  checkoutContainer.innerHTML = "";
  let total = 0;

  Object.values(cartData).forEach(item=>{
    const div = document.createElement("div");
    div.classList.add("checkout-item");

    const itemTotal = parseInt(item.price.replace(/\D/g,'')) * item.qty;
    total += itemTotal;

    div.innerHTML = `
      <img src="${item.img}" alt="${item.title}">
      <div class="item-info">
        <div class="item-title">${item.title}</div>
        <div class="item-qty">
          Кількість: 
          <button class="minus">-</button>
          <span>${item.qty}</span>
          <button class="plus">+</button>
        </div>
        <div class="item-price">Ціна: ${item.price}</div>
        <div class="item-total">Сума: ${itemTotal} грн</div>
      </div>
      <button class="remove-item">×</button>
    `;

    // + / -
    div.querySelector(".plus").onclick = () => {item.qty++; saveCart();};
    div.querySelector(".minus").onclick = () => {if(item.qty>1){item.qty--; saveCart();}};

    // Видалити товар
    div.querySelector(".remove-item").onclick = () => {delete cartData[item.id]; saveCart();};

    checkoutContainer.appendChild(div);
  });

  totalSumEl.innerText = "Загалом: " + total + " грн";
}

// ===== При завантаженні =====
renderCart();

// ===== Кнопка оформлення замовлення =====
document.getElementById("placeOrder").onclick = () => {
  if(Object.keys(cartData).length === 0){
    alert("Кошик порожній!");
    return;
  }

  let message = "Замовлення з RayFish:%0A";
  Object.values(cartData).forEach(item=>{
    const itemTotal = parseInt(item.price.replace(/\D/g,'')) * item.qty;
    message += `${item.title} - ${item.qty} шт. - ${itemTotal} грн%0A`;
  });
  const total = Object.values(cartData).reduce((sum,item)=>sum + parseInt(item.price.replace(/\D/g,''))*item.qty,0);
  message += `Загалом: ${total} грн`;

  // Посилання на Telegram юзера @RayFisherManager
  const tgLink = `https://t.me/RayFisherManager?text=${message}`;
  window.open(tgLink, "_blank");
};
</script>

</body>
</html>
