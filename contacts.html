<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакти</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f7fa;
}

/* header */
header{
  background:#0a5f8f;
  color:white;
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

/* menu */
nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:15px;
}

nav a{
  text-decoration:none;
  padding:12px 20px;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  color:white;
  background: linear-gradient(135deg, #0a5f8f, #00bfff);
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}

nav a:hover{
  background: linear-gradient(135deg, #ff9800, #ffb74d);
  transform: translateY(-3px);
  box-shadow: 0 6px 8px rgba(0,0,0,0.3);
}

/* контейнер */
.container{
  max-width:600px;
  margin:30px auto;
  padding:20px;
  background:white;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.container h2{
  font-size:24px;
  margin-bottom:15px;
}

.container p{
  font-size:16px;
  color:#555;
  margin:8px 0;
}

/* footer */
footer{
  background:#0a5f8f;
  color:white;
  text-align:center;
  padding:15px;
  font-size:14px;
}

/* мобільна адаптація */
@media(max-width:600px){

  nav{
    flex-direction:column;
  }

  nav a{
    width:90%;
    font-size:16px;
    padding:12px;
  }

}
</style>

</head>
<body>

<header>📞 Контакти RayFish</header>

<nav>
  <a href="index.html">Головна</a>
  <a href="products.html">Товари</a>
  <a href="sales.html">Акції</a>
  <a href="contacts.html">Контакти</a>
</nav>

<div class="container">
  <h2>Зв'яжіться з нами</h2>
  <p>Телефон: +380960839665</p>
  <p>Магазин RayFish</p>
</div>

<footer>
  RayFish © 2026
</footer>

</body>
</html>
