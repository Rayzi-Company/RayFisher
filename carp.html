<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RayFish — Карпова рибалка</title>
<style>
body{
  margin:0; padding:0;
  font-family: Arial,sans-serif;
  background:#f2f2f2;
}
header{
  text-align:center;
  padding:15px 0;
  background: linear-gradient(135deg,#0a5f8f,#00aaff);
  color:white;
  font-weight:bold;
  font-size:22px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
nav{
  display:flex; flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  background:white;
  padding:8px 0;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
nav a{
  color:#0a5f8f;
  text-decoration:none;
  font-weight:bold;
  padding:8px 12px;
  border-radius:8px;
  transition:0.3s;
}
nav a:hover{background:#e0f0ff;}
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  margin-top:20px;
}
.container h2{
  text-align:center;
  font-size:24px;
  margin-bottom:20px;
}

/* Товари: два в ряд по центру */
.products{
  display:grid;
  grid-template-columns:repeat(2,150px);
  justify-content:center;
  column-gap:10px;
  row-gap:15px;
}
.card{
  background:white;
  border-radius:10px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:300px;
  width:150px;
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}
.price{
  margin:5px 0;
  color:#0a5f8f;
  font-weight:bold;
}
.buy-button{
  display:inline-block;
  background: linear-gradient(135deg,#0a5f8f,#00aaff);
  color:white;
  padding:10px 18px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}
.buy-button:hover{
  background: linear-gradient(135deg,#005f99,#0088cc);
  transform:scale(1.05);
}

/* Повідомлення */
#message{
  position: fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#4caf50;
  color:white;
  padding:12px 25px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  display:none;
  z-index:2000;
  font-weight:bold;
}

/* Кнопка корзини закріплена */
.cart-toggle-btn{
  position: fixed;
  top:50%;
  right:10px;
  background:#0a5f8f;
  color:white;
  width:50px;
  height:50px;
  border-radius:10px;
  font-size:22px;
  border:none;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transform: translateY(-50%);
  z-index:2000;
  transition: transform 0.3s;
}
.cart-toggle-btn:hover{transform: scale(1.1) translateY(-50%);}

/* Overlay корзини */
.cart-overlay{
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.3);
  z-index:998;
  display:none;
}

/* Компактна корзина */
.cart-sidebar{
  position: fixed;
  top:50%;
  right:70px;
  width:250px;
  max-height:350px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
  overflow-y:auto;
  transform: scale(0);
  transform-origin:center right;
  transition: transform 0.3s ease;
  z-index:999;
}
.cart-sidebar.active{transform: scale(1);}
.cart-sidebar h2{text-align:center;color:#0a5f8f;margin-top:0;font-size:20px;}
.cart-sidebar #closeCart{
  position:absolute;
  top:10px;
  right:10px;
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
}
.checkout-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px auto;
  padding:10px 15px;
  background: linear-gradient(135deg,#0a5f8f,#00aaff);
  color:white; font-weight:bold;
  border-radius:10px;
  text-decoration:none;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition:0.3s;
}
.checkout-btn span{
  background: rgba(255,255,255,0.2);
  padding:4px 8px;
  border-radius:6px;
}
.checkout-btn:hover{transform:scale(1.05);}

/* Товари в корзині */
.cart-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #ccc;
  padding:6px 0;
}
.cart-item img{width:40px;height:40px;border-radius:6px;margin-right:8px;object-fit:cover;}
.cart-item-info{flex:1;}
.cart-item-title{font-weight:bold;color:#0a5f8f;font-size:14px;}
.cart-item-price{color:#0a5f8f;margin-top:2px;font-size:13px;}
.cart-item-qty{display:flex;align-items:center;gap:5px;margin-top:3px;}
.cart-item-qty button{padding:2px 5px;border:none;background:#5dade2;color:white;border-radius:4px;cursor:pointer;font-size:12px;}

/* Мобільний телефон */
@media(max-width:600px){
  nav{flex-direction:column;}
  nav a{width:90%;padding:10px;}
  .products{grid-template-columns:1fr; justify-items:center; gap:10px;}
  .card{width:160px; height:280px;}
  .cart-toggle-btn{top:auto; bottom:15px; right:15px; transform:none;}
  .cart-sidebar{top:auto; bottom:70px; right:15px;}
}
</style>
</head>
<body>

<header>🎣 RayFish — Карпфішинг</header>
<nav>
<a href="index.html">Головна</a>
<a href="products.html">Товари</a>
<a href="sales.html">Акції</a>
<a href="contacts.html">Контакти</a>
</nav>

<div class="container">
<h2>Великий вибір товарів</h2>
<div class="products" id="products"></div>
</div>

<div id="message"></div>
<div class="cart-overlay" id="cartOverlay"></div>
<button class="cart-toggle-btn">🛒</button>

<div class="cart-sidebar" id="cartSidebar">
<button id="closeCart">✖</button>
<h2>Корзина</h2>
<div id="cartItems"></div>
<a href="checkout.html" class="checkout-btn">Оформити <span id="cartTotal">0 грн</span></a>
</div>

<footer style="text-align:center;padding:15px;background:#0a5f8f;color:white;">
Телефон: +380960839665
</footer>

<script>
// Масив товарів
const productsList = [
{id:1,title:"PVA Пакет",price:"99 грн",img:"carp1.jpg"},
{id:2,title:"Кепка Карпятника",price:"300 грн",img:"carp2.jpg"},
{id:3,title:"",price:"50 грн",img:"carp3.jpg"},
{id:4,title:"",price:"50 грн",img:"carp4.jpg"},
{id:5,title:"",price:"50 грн",img:"carp5.jpg"},
{id:6,title:"",price:"50 грн",img:"carp6.jpg"},
{id:7,title:"",price:"50 грн",img:"carp7.jpg"},
{id:8,title:"",price:"50 грн",img:"carp8.jpg"},
{id:9,title:"",price:"50 грн",img:"carp9.jpg"},
{id:10,title:"",price:"50 грн",img:"carp10.jpg"},
];

// Відображення товарів
const productsEl=document.getElementById("products");
productsList.forEach(product=>{
  productsEl.innerHTML += `
  <div class="card" data-id="${product.id}">
    <img src="${product.img}" alt="${product.title}">
    <h3>${product.title}</h3>
    <div class="price">${product.price}</div>
    <a href="#" class="buy-button">Купити</a>
  </div>`;
});

// Повідомлення
function showMessage(text){
  const msg=document.getElementById("message");
  msg.innerText=text; 
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",1500);
}

// Toggle корзини
const cartBtn=document.querySelector(".cart-toggle-btn");
const cartSidebar=document.getElementById("cartSidebar");
const cartOverlay=document.getElementById("cartOverlay");
const closeCart=document.getElementById("closeCart");
const cartItemsContainer=document.getElementById("cartItems");
function toggleCart(){
  if(cartSidebar.classList.contains("active")){
    cartSidebar.classList.remove("active"); cartOverlay.style.display="none";
  }else{
    cartSidebar.classList.add("active"); cartOverlay.style.display="block";
  }
}
cartBtn.onclick=toggleCart;
closeCart.onclick=toggleCart;
cartOverlay.onclick=toggleCart;

// Кошик
let cartData = JSON.parse(localStorage.getItem('rayfishCart')) || {};

function updateLocalStorage(){
  localStorage.setItem('rayfishCart', JSON.stringify(cartData));
}

document.addEventListener("click",function(e){
  if(e.target.classList.contains("buy-button")){
    e.preventDefault();
    const card=e.target.closest(".card");
    const id=card.dataset.id;
    const product=productsList.find(p=>p.id==id);
    if(cartData[id]){cartData[id].qty++;}else{cartData[id]={...product,qty:1};}
    renderCart();
    updateLocalStorage();
    showMessage("Товар додано у кошик");
  }
});

function renderCart(){
  cartItemsContainer.innerHTML="";
  let total = 0;
  Object.values(cartData).forEach(item=>{
    const div=document.createElement("div");
    div.classList.add("cart-item");
    div.innerHTML=`
      <img src="${item.img}" alt="${item.title}">
      <div class="cart-item-info">
        <div class="cart-item-title">${item.title}</div>
        <div class="cart-item-price">${item.price}</div>
        <div class="cart-item-qty">
          <button class="minus">-</button>
          <span>${item.qty}</span>
          <button class="plus">+</button>
        </div>
      </div>
      <button class="remove-item">×</button>
    `;
    div.querySelector(".plus").onclick=()=>{
      item.qty++; renderCart(); updateLocalStorage();
    };
    div.querySelector(".minus").onclick=()=>{
      if(item.qty>1){item.qty--; renderCart(); updateLocalStorage();}
    };
    div.querySelector(".remove-item").onclick=()=>{
      delete cartData[item.id]; renderCart(); updateLocalStorage();
    };
    cartItemsContainer.appendChild(div);
    total += parseInt(item.price.replace(/\D/g,'')) * item.qty;
  });
  document.getElementById("cartTotal").innerText = total + " грн";
}

// Ініціалізація кошика при завантаженні
renderCart();
</script>

</body>
</html>
